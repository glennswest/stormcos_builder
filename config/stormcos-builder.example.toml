# stormcos-builder configuration.

listen = "0.0.0.0:8080"
data_dir = "/var/lib/stormcos-builder"   # images/, logs/, state.json
poll_interval_secs = 300
auto_build = true                        # rebuild affected flavors on change
keep_releases = 3                        # keep the last N releases PER FLAVOR;
                                         # older ones (artifacts + log + record)
                                         # are pruned automatically after each
                                         # successful build. 0 disables.

[dns]
base_url = "http://192.168.8.252:8080/api/v1"   # MicroDNS
zone_id  = "9bed60c8-1664-4183-88f9-a1a21b927edc" # g8.lo

[scripts]
build_image       = "scripts/build-image.sh"
provision_cluster = "scripts/provision-cluster.sh"
rebuild_machine   = "scripts/rebuild-machine.sh"
delete_cluster    = "scripts/delete-cluster.sh"

# --- assets: repos to watch ------------------------------------------------
[[components]]
name = "stormcos"
repo = "glennswest/stormcos"
[[components]]
name = "stormblock"
repo = "glennswest/stormblock"
[[components]]
name = "rspacefs"
repo = "glennswest/rspacefs"
[[components]]
name = "network-operator" # our Cluster Network Operator — owns Cilium's lifecycle
repo = "glennswest/network-operator"
[[components]]
name = "rustkube"
repo = "glennswest/rustkube"
[[components]]
name = "rustkube-node"
repo = "glennswest/rustkube-node"
[[components]]
name = "fastetcd"
repo = "glennswest/fastetcd"
[[components]]
name = "cadvisor"
repo = "glennswest/cadvisor"
[[components]]
name = "ironprom"
repo = "glennswest/ironprom"
[[components]]
name = "stormcos-installer"
repo = "glennswest/stormcos-installer"

# --- flavor: ONE node image -------------------------------------------------
# stormcos ships a single node image by design — editions/kubernetes.toml:
# "the platform's one node image ... Node roles (control plane, stormblock
# server, stormfork host) are activated per node by the TOML manifest — the
# image carries all role components."
#
# The previous base -> network -> open-stormcos layering built the SAME edition
# from the SAME layers three times (flavor_edition() returned "kubernetes"
# regardless), so it produced three byte-equivalent images, tripling build time
# and storage for nothing. Roles are a runtime manifest concern, not a build
# concern.
#
# A second flavor should only ever exist if it genuinely composes a DIFFERENT
# edition (a different layer stack) — not to express a role.
[[flavors]]
name = "stormcos"
description = "The stormcos node image: all role components; roles activated per node by manifest"
assets = [
    "stormcos", "stormblock", "rspacefs", "stormcos-installer",
    "network-operator", "rustkube", "rustkube-node", "fastetcd",
    "cadvisor", "ironprom",
]

# --- in-process Rust build pipeline (Linux build host) --------------------
# When present, build-image runs in Rust: stormcos-install's boot-image
# library is called in-process, compose steps drive the stormcos-compose
# binary, and qemu-img makes the qcow2 — no bash build script. Omit this
# section to fall back to scripts.build_image.
# [pipeline]
# kernel      = "/root/kver/x/lib/modules/6.12.0-211.34.1.el10_2.x86_64/vmlinuz"
# # BASE stormblock initramfs; the pipeline injects this build's volumes.dat +
# # storage modules into a copy of it per build.
# initramfs   = "/root/stormcos-initramfs.img"
# initramfs_sh = "/root/projects/stormcos-installer/scripts/stormcos-initramfs.sh"
# modules_dir = "/root/kver/x/lib/modules/6.12.0-211.34.1.el10_2.x86_64"
# kver        = "6.12.0-211.34.1.el10_2.x86_64"
# # Optional: rebuild the base initramfs when stormblock changes.
# stormblock_initramfs_sh = "/root/projects/stormblock/scripts/build-stormblock-initramfs.sh"
# stormblock_bin = "/root/projects/stormblock/target/x86_64-unknown-linux-musl/release/stormblock"
# bootloader  = "/usr/lib/systemd/boot/efi/systemd-bootx64.efi"
# disk_device = "/dev/sda"
# compose_bin = "stormcos-compose"
# layers_dir  = "/root/layers"
# image_store = "/root/out/image-store-kubernetes.erofs"
# editions_dir = "/root/projects/stormcos/editions"
# qemu_img    = "qemu-img"

# --- QA (stormcos_qa pulled into the builder VM) ----------------------------
# After each build the builder runs image-scope QA; after provisioning a node
# it runs cluster-scope QA against it. Any blocking failure tombstones the
# release. Set qe_key to enable cluster-scope tests (SSH to the node as `storm`
# via the baked QE key — stormcos keys/qe.pub).
# [qa]
# runner      = "qa-runner"
# tests_dir   = "/root/projects/stormcos_qa/tests"
# file_issues = true
# qe_key      = "/root/.ssh/stormcos-qe"

# --- buildvm: build in an ephemeral Proxmox VM cloned from the golden template -
# When set, the build clones the golden template VM (linked CoW on flash),
# runs `stormcos-builder build` inside it (own kernel -> native ublk), fetches
# the manifest, and destroys the clone. A build failure files an issue on `repo`.
# [buildvm]
# api         = "https://pve.g8.lo:8006/api2/json"
# node        = "pve"
# token       = ""                     # or $DEVCT_TOKEN / $PROXMOX_API_TOKEN
# repo        = "glennswest/stormcos"  # failure -> issue here
# template    = 9002                   # sealed golden build-VM template
# ssh_user    = "fedora"
# ssh_key     = "/root/.ssh/stormcos-qe"
# vm_config   = "/root/builder-vm.toml"   # config the in-VM `build` uses
# builder_bin = ""                        # default: the coordinator's own binary
# cores       = 8
# memory_mb   = 16384
