# stormcos-builder configuration.

listen = "0.0.0.0:8080"
data_dir = "/var/lib/stormcos-builder"   # images/, logs/, state.json
poll_interval_secs = 300
auto_build = true                        # rebuild affected flavors on change

[dns]
base_url = "http://192.168.8.252:8080/api/v1"   # MicroDNS
zone_id  = "9bed60c8-1664-4183-88f9-a1a21b927edc" # g8.lo

[scripts]
build_image       = "scripts/build-image.sh"
provision_cluster = "scripts/provision-cluster.sh"
rebuild_machine   = "scripts/rebuild-machine.sh"
delete_cluster    = "scripts/delete-cluster.sh"

# --- assets: repos to watch ------------------------------------------------
[[components]]
name = "stormcos"
repo = "glennswest/stormcos"
[[components]]
name = "stormblock"
repo = "glennswest/stormblock"
[[components]]
name = "rspacefs"
repo = "glennswest/rspacefs"
[[components]]
name = "cilium"           # placeholder for the network layer / CNI integration
repo = "glennswest/rustkube-node"
[[components]]
name = "rustkube"
repo = "glennswest/rustkube"
[[components]]
name = "rustkube-node"
repo = "glennswest/rustkube-node"
[[components]]
name = "fastetcd"
repo = "glennswest/fastetcd"
[[components]]
name = "cadvisor"
repo = "glennswest/cadvisor"
[[components]]
name = "ironprom"
repo = "glennswest/ironprom"
[[components]]
name = "stormcos-installer"
repo = "glennswest/stormcos-installer"

# --- flavors: layer up base -> network -> ... -> release -------------------
[[flavors]]
name = "base"
description = "Minimal bootable stormcos: kernel + stormblock root + systemd"
assets = ["stormcos", "stormblock", "rspacefs", "stormcos-installer"]

[[flavors]]
name = "network"
description = "base + CNI/networking layer"
extends = "base"
assets = ["cilium"]

[[flavors]]
name = "open-stormcos"
description = "Full open release: control plane + node agent + observability"
extends = "network"
assets = ["rustkube", "rustkube-node", "fastetcd", "cadvisor", "ironprom"]

# --- in-process Rust build pipeline (Linux build host) --------------------
# When present, build-image runs in Rust: stormcos-install's boot-image
# library is called in-process, compose steps drive the stormcos-compose
# binary, and qemu-img makes the qcow2 — no bash build script. Omit this
# section to fall back to scripts.build_image.
# [pipeline]
# kernel      = "/root/kver/x/lib/modules/6.12.0-211.34.1.el10_2.x86_64/vmlinuz"
# initramfs   = "/root/stormcos-initramfs-ci.img"
# bootloader  = "/usr/lib/systemd/boot/efi/systemd-bootx64.efi"
# disk_device = "/dev/sda"
# compose_bin = "stormcos-compose"
# layers_dir  = "/root/layers"
# image_store = "/root/out/image-store-kubernetes.erofs"
# qemu_img    = "qemu-img"
